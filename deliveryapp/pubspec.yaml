name: deliveryapp
description: "RiFresh Delivery Partner App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  dio: ^5.7.0
  shared_preferences: ^2.5.5
  geolocator: ^13.0.2
  permission_handler: ^12.0.1
  google_fonts: ^8.1.0
  pinput: ^6.0.2
  image_picker: ^1.2.2
  url_launcher: ^6.3.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  audioplayers: ^6.7.0

dependency_overrides:
  path_provider_android: 2.2.17
  geolocator_android: 4.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/driver_logo.png"
