<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiFresh Legal & Policies</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-white rounded-xl shadow-md p-8">
        <h1 class="text-3xl font-bold text-center text-green-700 mb-2">RiFresh Legal & Policies</h1>
        <p class="text-center text-gray-600 mb-8">Select the app you want to view policies for.</p>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Customer App Section -->
            <div class="border border-gray-200 rounded-lg p-6 bg-green-50">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    RiFresh Customer App
                </h2>
                <ul class="space-y-3">
                    <li>
                        <a href="customer-privacy-policy.html" class="text-blue-600 hover:underline flex items-center gap-2">
                            Privacy Policy
                        </a>
                    </li>
                    <li>
                        <a href="customer-delete-account.html" class="text-red-600 hover:underline flex items-center gap-2">
                            Delete Account
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Driver App Section -->
            <div class="border border-gray-200 rounded-lg p-6 bg-blue-50">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    RiFresh Delivery App
                </h2>
                <ul class="space-y-3">
                    <li>
                        <a href="driver-privacy-policy.html" class="text-blue-600 hover:underline flex items-center gap-2">
                            Privacy Policy
                        </a>
                    </li>
                    <li>
                        <a href="driver-delete-account.html" class="text-red-600 hover:underline flex items-center gap-2">
                            Delete Account
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
